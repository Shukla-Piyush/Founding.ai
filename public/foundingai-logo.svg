<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" width="40" height="40">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon frame -->
  <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#grad1)" opacity="0.15"/>
  <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="url(#grad2)" stroke-width="1.2" opacity="0.8"/>

  <!-- Inner neural network nodes -->
  <!-- Center node -->
  <circle cx="20" cy="20" r="3" fill="url(#grad2)" filter="url(#glow)"/>

  <!-- Orbit nodes -->
  <circle cx="20" cy="10" r="2" fill="#A78BFA" opacity="0.9"/>
  <circle cx="29" cy="15" r="2" fill="#7C3AED" opacity="0.9"/>
  <circle cx="29" cy="25" r="2" fill="#2563EB" opacity="0.9"/>
  <circle cx="20" cy="30" r="2" fill="#60A5FA" opacity="0.9"/>
  <circle cx="11" cy="25" r="2" fill="#7C3AED" opacity="0.9"/>
  <circle cx="11" cy="15" r="2" fill="#A78BFA" opacity="0.9"/>

  <!-- Connection lines from center -->
  <line x1="20" y1="20" x2="20" y2="10" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="29" y2="15" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="29" y2="25" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="20" y2="30" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="11" y2="25" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="11" y2="15" stroke="url(#grad2)" stroke-width="0.8" opacity="0.6"/>

  <!-- Orbit ring connections -->
  <polygon points="20,10 29,15 29,25 20,30 11,25 11,15" fill="none" stroke="url(#grad2)" stroke-width="0.5" opacity="0.3"/>

  <!-- Center bright dot -->
  <circle cx="20" cy="20" r="1.5" fill="#fff" opacity="0.95" filter="url(#glow)"/>
</svg>
